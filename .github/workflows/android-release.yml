name: Android Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: 拉取代码 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 版本检测 Version Gate
        id: gate
        run: |
          V_NAME=$(grep "versionName =" app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          V_CODE=$(grep "versionCode =" app/build.gradle.kts | sed 's/[^0-9]//g')
          if ! [[ "$V_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "versionName must use X.X.X format: $V_NAME"
            exit 1
          fi
          if ! [[ "$V_CODE" =~ ^[1-9][0-9]*$ ]]; then
            echo "versionCode must be a positive integer: $V_CODE"
            exit 1
          fi
          echo "name=$V_NAME" >> $GITHUB_OUTPUT
          echo "code=$V_CODE" >> $GITHUB_OUTPUT

          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "manual trigger, proceeding"
            exit 0
          fi
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            PREV_NAME=$(git show HEAD~1:app/build.gradle.kts | grep "versionName =" | sed 's/.*"\(.*\)".*/\1/')
            PREV_CODE=$(git show HEAD~1:app/build.gradle.kts | grep "versionCode =" | sed 's/[^0-9]//g')
            if [ "$V_NAME" != "$PREV_NAME" ] || [ "$V_CODE" != "$PREV_CODE" ]; then
              echo "skip=false" >> $GITHUB_OUTPUT
              echo "version changed (Name: $PREV_NAME -> $V_NAME, Code: $PREV_CODE -> $V_CODE), proceeding"
            else
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "version unchanged (Name: $V_NAME, Code: $V_CODE), skipping build"
            fi
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: 安装 JDK Setup Java
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: 安装 Android SDK Setup Android SDK
        if: steps.gate.outputs.skip != 'true'
        uses: android-actions/setup-android@v4
        with:
          api-level: 34
          build-tools: '34.0.0'

      - name: 配置 Gradle Setup Gradle
        if: steps.gate.outputs.skip != 'true'
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: wrapper
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: 授权脚本 Grant Permission
        if: steps.gate.outputs.skip != 'true'
        run: chmod +x gradlew

      - name: 构建 Debug 与 Release Build Debug and Release
        if: steps.gate.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew assembleDebug assembleRelease --build-cache

      - name: 上传构建产物 Upload Build Artifacts
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: debug-release-apks
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error

      - name: 解码签名密钥 Decode Keystore
        if: github.event_name != 'pull_request' && steps.gate.outputs.skip == 'false'
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: echo "$SIGNING_KEY" | base64 -d > release.jks

      - name: 签名 Sign APKs
        if: github.event_name != 'pull_request' && steps.gate.outputs.skip == 'false'
        env:
          STORE_PASS: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ALIAS }}
        run: |
          BTDIR="$ANDROID_SDK_ROOT/build-tools/34.0.0"
          ZA="$BTDIR/zipalign"
          AS="$BTDIR/apksigner"

          V_NAME="${{ steps.gate.outputs.name }}"
          V_CODE="${{ steps.gate.outputs.code }}"

          DEBUG_IN=$(find app/build/outputs/apk/debug -maxdepth 1 -type f -name '*-debug.apk' -print -quit)
          RELEASE_IN=$(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' -print -quit)
          test -n "$DEBUG_IN"
          test -n "$RELEASE_IN"

          $ZA -f -v -p 4 "$DEBUG_IN" debug-aligned.apk
          $ZA -f -v -p 4 "$RELEASE_IN" release-aligned.apk
          $AS sign --ks release.jks --ks-pass env:STORE_PASS --ks-key-alias "$KEY_ALIAS" --key-pass env:KEY_PASS --out "HyperLyrics Enhanced-debug-v${V_NAME}-${V_CODE}.apk" debug-aligned.apk
          $AS sign --ks release.jks --ks-pass env:STORE_PASS --ks-key-alias "$KEY_ALIAS" --key-pass env:KEY_PASS --out "HyperLyrics Enhanced-release-v${V_NAME}-${V_CODE}.apk" release-aligned.apk

      - name: 生成发布说明 Generate Release Body
        if: github.event_name != 'pull_request' && steps.gate.outputs.skip == 'false'
        id: release_body
        run: |
          PREV_TAG="${{ steps.gate.outputs.prev_tag }}"
          BODY_DELIMITER="release_body_$(git rev-parse HEAD)"
          echo "body<<$BODY_DELIMITER" >> "$GITHUB_OUTPUT"
          .github/scripts/generate-release-body.sh "$PREV_TAG" >> "$GITHUB_OUTPUT"
          echo "$BODY_DELIMITER" >> "$GITHUB_OUTPUT"

      - name: 创建发布 Create Release
        if: github.event_name != 'pull_request' && steps.gate.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.gate.outputs.name }}
          name: v${{ steps.gate.outputs.name }}
          body: ${{ steps.release_body.outputs.body }}
          draft: false
          prerelease: false
          generate_release_notes: false
          files: |
            HyperLyrics Enhanced-debug-v${{ steps.gate.outputs.name }}-${{ steps.gate.outputs.code }}.apk
            HyperLyrics Enhanced-release-v${{ steps.gate.outputs.name }}-${{ steps.gate.outputs.code }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
